<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Mısra — Kişisel Bilgisayar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="apple_logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel='stylesheet' href='https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/themes/smoothness/jquery-ui.css'>
  <link rel='stylesheet' href='https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css'>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prefixfree/1.0.7/prefixfree.min.js"></script>
  <style>
    .window { transition: opacity 0.2s ease, transform 0.2s ease !important; }
    .window.window--minimized { opacity:0 !important; transform:scale(0.93) !important; pointer-events:none !important; }
    .window:not(.window--minimized) { opacity:1 !important; transform:scale(1) !important; }
    .icon-img { width:42px !important; height:42px !important; border-radius:12px; object-fit:cover; display:block !important; pointer-events:none; }
    .taskbarApp { display:flex !important; align-items:center !important; justify-content:center !important; transition:transform 0.15s ease !important; }
    .taskbarApp:hover { transform:translateY(-6px) scale(1.1) !important; }
    .wa-day { text-align:center; color:#8696a0; font-size:11px; background:#182229; border-radius:6px; padding:3px 10px; margin:10px auto; width:fit-content; }
    .wa-msg { max-width:72%; padding:7px 10px; border-radius:8px; font-size:13px; line-height:1.5; word-break:break-word; }
    .wa-in { background:#202c33; color:#e9edef; align-self:flex-start; border-radius:0 8px 8px 8px; }
    .wa-out { background:#005c4b; color:#e9edef; align-self:flex-end; border-radius:8px 0 8px 8px; }
    .misra-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:rgba(255,255,255,0.4); font-size:13px; }
    .misra-placeholder img { width:64px; height:64px; border-radius:14px; object-fit:cover; }
    .window--messages .window__body, .window--whatsapp .window__body,
    .window--instagram .window__body, .window--photos .window__body,
    .window--spotify .window__body, .window--letterboxd .window__body,
    .window--game1 .window__body, .window--game2 .window__body,
    .window--cal3 .window__body { position:absolute; top:28px; left:0; right:0; bottom:0; width:100%; height:calc(100% - 28px); overflow:hidden; }
  </style>
</head>
<body class="night">
  <div class="sPanel sPanelTest round disabled"></div>

  <div class="lockScreen" sysDesktopBackground>
    <div class="user" data-user="Mısra"></div>
    <div class="lockScreenLogIn">
      <input type="password" class="systemLockInput" placeholder="Şifre" autocomplete="off" />
      <div class="login empty"></div>
    </div>
  </div>

  <div class="taskbar">
    <div class="taskbarApp" data-trigger="sAppsMenu"><i class="icon" data-icon="launchpad"></i></div>
    <div class="taskbarApp open" data-window="files"><i class="icon" data-icon="finder"></i></div>
    <div class="taskbarApp open" data-window="messages"><i class="icon" data-icon="messages"></i></div>
    <div class="taskbarApp open" data-window="game1"><img class="icon-img" src="icon_tetris.png" alt="Tetris" /></div>
    <div class="taskbarApp open" data-window="instagram"><img class="icon-img" src="icon_instagram.png" alt="Instagram" /></div>
    <div class="taskbarApp open" data-window="photos"><img class="icon-img" src="icon_photos.png" alt="Fotoğraflar" /></div>
    <div class="taskbarApp open" data-window="spotify"><img class="icon-img" src="icon_spotify.png" alt="Spotify" /></div>
    <div class="taskbarApp open" data-window="letterboxd"><img class="icon-img" src="icon_letterboxd.png" alt="Letterboxd" /></div>
    <div class="taskbarApp open" data-window="game2"><img class="icon-img" src="icon_crossword.png" alt="Kelime" /></div>
    <div class="taskbarApp open" data-window="cal3"><i class="icon" data-icon="calendar"></i></div>
    <div class="sep"></div>
    <div class="taskbarApp open" data-window="preferences"><i class="icon" data-icon="preferences"></i></div>
  </div>

  <div class="appMenu" sysDesktopBackgroundBlur>
    <div class="closeAppsMenu"></div>
    <label class="searchApp"><i></i><input type="text" placeholder="Ara" data-search spellcheck="false" class="appMenuSearch" /></label>
    <div class="page appMenuAppList">
      <div class="closeAppsMenu"></div>
      <div class="app" data-filter-item data-filters="finder"><div class="icon" data-icon="finder" data-window="files"></div><div class="name">Finder</div></div>
      <div class="app" data-filter-item data-filters="mesajlar"><div class="icon" data-icon="messages" data-window="messages"></div><div class="name">Mesajlar</div></div>
      <div class="app" data-filter-item data-filters="tetris"><div class="icon" style="background-image:url(icon_tetris.png);background-size:cover;" data-window="game1"></div><div class="name">Tetris</div></div>
      <div class="app" data-filter-item data-filters="kelime oyun"><div class="icon" style="background-image:url(icon_crossword.png);background-size:cover;" data-window="game2"></div><div class="name">Kelime Oyunu</div></div>
      <div class="app" data-filter-item data-filters="spotify"><div class="icon" style="background-image:url(icon_spotify.png);background-size:cover;" data-window="spotify"></div><div class="name">Spotify</div></div>
      <div class="app" data-filter-item data-filters="instagram"><div class="icon" style="background-image:url(icon_instagram.png);background-size:cover;" data-window="instagram"></div><div class="name">Instagram</div></div>
      <div class="app" data-filter-item data-filters="fotoğraflar"><div class="icon" style="background-image:url(icon_photos.png);background-size:cover;" data-window="photos"></div><div class="name">Fotoğraflar</div></div>
      <div class="app" data-filter-item data-filters="letterboxd"><div class="icon" style="background-image:url(icon_letterboxd.png);background-size:cover;" data-window="letterboxd"></div><div class="name">Letterboxd</div></div>
      <div class="app" data-filter-item data-filters="takvim"><div class="icon" data-icon="calendar" data-window="cal3"></div><div class="name">Takvim</div></div>
      <div class="app" data-filter-item data-filters="ayarlar"><div class="icon" data-icon="preferences" data-window="preferences"></div><div class="name">Sistem Tercihleri</div></div>
    </div>
  </div>

  <div class="actionbar">
    <div class="leftActions">
      <div class="item" data-trigger="sPanelLogOptions"></div>
      <div class="group" data
